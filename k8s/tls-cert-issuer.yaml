---
# Step 1: Create a self-signed ClusterIssuer
# This tells cert-manager to issue self-signed certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# Step 2: Create a CA (Certificate Authority) Certificate
# cert-manager will use this CA to sign the wisecow TLS cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wisecow-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: wisecow-ca
  secretName: wisecow-ca-secret
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3: Create a CA-backed ClusterIssuer
# The Ingress TLS cert will be signed by this CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: wisecow-ca-issuer
spec:
  ca:
    secretName: wisecow-ca-secret
