apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisecow-ingress
  annotations:
    # Use nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # cert-manager will auto-issue and renew the TLS certificate
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
spec:
  tls:
    - hosts:
        - wisecow.local
      secretName: wisecow-tls   # cert-manager stores the cert here
  rules:
    - host: wisecow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wisecow-service
                port:
                  number: 80
